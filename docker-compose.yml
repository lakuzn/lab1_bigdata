networks:
  kafka_network:
    driver: bridge

services:
  kafka-0:
    image: bitnamilegacy/kafka:latest
    networks:
      - kafka_network
    ports:
      - "9092:9092"

    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-0:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1

  producer:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    networks:
      - kafka_network
    environment:
      - KAFKA_BROKER=kafka-0:9092
    volumes:
      - ./data:/app/data
    command: ["python", "backend/producer.py"]
    depends_on:
      - kafka-0

  consumer:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: always
    networks:
      - kafka_network
    environment:
      - KAFKA_BROKER=kafka-0:9092
    volumes:
      - ./data:/app/data
    command: ["python", "backend/consumer.py"]
    depends_on:
      - kafka-0

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    networks:
      - kafka_network
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - consumer